<svg xmlns="http://www.w3.org/2000/svg" width="720" height="435" viewBox="0 0 720 435" role="img">
<rect x="0.5" y="0.5" width="719" height="434" rx="8" fill="#ffffff" stroke="#d9d4cc" stroke-width="1"/>
<text x="24.0" y="32.0" font-family="Helvetica" font-size="14" fill="#1a1a1a" text-anchor="start" font-weight="bold">Bradford Hill appraisal of the PM2.5–Alzheimer's evidence</text>
<text x="24.0" y="52.0" font-family="Helvetica" font-size="9" fill="#888888" text-anchor="start">Source: §7, full report — Association versus causation</text>
<line x1="24" y1="80.0" x2="696" y2="80.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="98.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Temporality</text>
<circle cx="250.0" cy="94.0" r="9" fill="none" stroke="#1a7f37" stroke-width="1.6"/><path d="M 245.9 94.0 L 249.1 97.6 L 254.5 90.0" fill="none" stroke="#1a7f37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<text x="278.0" y="97.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Exposure precedes diagnosis by years to decades.</text>
<line x1="24" y1="108.0" x2="696" y2="108.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="132.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Consistency</text>
<circle cx="250.0" cy="128.0" r="9" fill="none" stroke="#c4500a" stroke-width="1.6"/><path d="M 250.0 119.0 A 9 9 0 0 0 250.0 137.0 Z" fill="#c4500a"/>
<text x="278.0" y="124.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Positive and significant on the largest pooling, but null in the Wilker overall</text>
<text x="278.0" y="137.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">estimate — concentrated in active-ascertainment studies.</text>
<line x1="24" y1="148.0" x2="696" y2="148.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="178.5" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Dose–response</text>
<circle cx="250.0" cy="174.5" r="9" fill="none" stroke="#c4500a" stroke-width="1.6"/><path d="M 250.0 165.5 A 9 9 0 0 0 250.0 183.5 Z" fill="#c4500a"/>
<text x="278.0" y="164.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Suggested by per-increment meta estimates and low-concentration Shi/Grande</text>
<text x="278.0" y="177.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">findings; Chen's gradient is road proximity (composite), so weaker</text>
<text x="278.0" y="190.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">concentration–response evidence than it first appears.</text>
<line x1="24" y1="201.0" x2="696" y2="201.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="219.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Biological plausibility</text>
<circle cx="250.0" cy="215.0" r="9" fill="none" stroke="#1a7f37" stroke-width="1.6"/><path d="M 245.9 215.0 L 249.1 218.6 L 254.5 210.9" fill="none" stroke="#1a7f37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<text x="278.0" y="218.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Candidate mechanisms (§5) are coherent and supported by animal/in-vitro work.</text>
<line x1="24" y1="229.0" x2="696" y2="229.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="247.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Coherence</text>
<circle cx="250.0" cy="243.0" r="9" fill="none" stroke="#1a7f37" stroke-width="1.6"/><path d="M 245.9 243.0 L 249.1 246.6 L 254.5 238.9" fill="none" stroke="#1a7f37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<text x="278.0" y="246.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Mechanistic picture coheres with the cardiovascular-mediation finding in SNAC-K.</text>
<line x1="24" y1="257.0" x2="696" y2="257.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="281.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Experimental</text>
<circle cx="250.0" cy="277.0" r="9" fill="none" stroke="#c4500a" stroke-width="1.6"/><path d="M 250.0 268.0 A 9 9 0 0 0 250.0 286.0 Z" fill="#c4500a"/>
<text x="278.0" y="273.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Animal support exists [1,7], but human randomized trials are ethically</text>
<text x="278.0" y="286.5" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">impossible.</text>
<line x1="24" y1="297.0" x2="696" y2="297.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="315.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Specificity</text>
<circle cx="250.0" cy="311.0" r="9" fill="none" stroke="#b42318" stroke-width="1.6"/><line x1="245.9" y1="306.9" x2="254.1" y2="315.1" stroke="#b42318" stroke-width="1.8" stroke-linecap="round"/><line x1="254.1" y1="306.9" x2="245.9" y2="315.1" stroke="#b42318" stroke-width="1.8" stroke-linecap="round"/>
<text x="278.0" y="314.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">PM is associated with many organs and outcomes, not dementia uniquely.</text>
<line x1="24" y1="325.0" x2="696" y2="325.0" stroke="#e5e0d8" stroke-width="1"/>
<text x="24.0" y="343.0" font-family="Helvetica" font-size="11" fill="#1a1a1a" text-anchor="start" font-weight="bold">Strength</text>
<circle cx="250.0" cy="339.0" r="9" fill="none" stroke="#c4500a" stroke-width="1.6"/><path d="M 250.0 330.0 A 9 9 0 0 0 250.0 348.0 Z" fill="#c4500a"/>
<text x="278.0" y="342.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">Moderate (hazard ratios typically 1.05–1.5), not large.</text>
<line x1="24" y1="359.0" x2="696" y2="359.0" stroke="#d9d4cc" stroke-width="1"/>
<circle cx="33.0" cy="377.0" r="9" fill="none" stroke="#1a7f37" stroke-width="1.6"/><path d="M 28.9 377.0 L 32.1 380.6 L 37.5 372.9" fill="none" stroke="#1a7f37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<text x="48.0" y="381.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">met</text>
<circle cx="101.6" cy="377.0" r="9" fill="none" stroke="#c4500a" stroke-width="1.6"/><path d="M 101.6 368.0 A 9 9 0 0 0 101.6 386.0 Z" fill="#c4500a"/>
<text x="116.6" y="381.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">partial</text>
<circle cx="195.0" cy="377.0" r="9" fill="none" stroke="#b42318" stroke-width="1.6"/><line x1="190.9" y1="372.9" x2="199.1" y2="381.1" stroke="#b42318" stroke-width="1.8" stroke-linecap="round"/><line x1="199.1" y1="372.9" x2="190.9" y2="381.1" stroke="#b42318" stroke-width="1.8" stroke-linecap="round"/>
<text x="210.0" y="381.0" font-family="Helvetica" font-size="10" fill="#555555" text-anchor="start">weak</text>
<text x="24.0" y="407.0" font-family="Helvetica" font-size="11" fill="#c4500a" text-anchor="start" font-weight="bold">Bottom line: On balance, the evidence supports causation as plausible but not proven.</text>
</svg>
